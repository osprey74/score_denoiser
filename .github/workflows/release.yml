name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build (${{ matrix.os }} / ${{ matrix.target }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar-ext: .exe
            tauri-args: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            sidecar-ext: ''
            tauri-args: '--target aarch64-apple-darwin'
          - os: macos-latest
            target: x86_64-apple-darwin
            sidecar-ext: ''
            tauri-args: '--target x86_64-apple-darwin'
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ── Python + PyInstaller でサイドカーをバンドル ──
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        shell: bash
        run: |
          cd sidecar
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build sidecar with PyInstaller
        shell: bash
        run: |
          cd sidecar
          pyinstaller --noconfirm --onefile --name sidecar \
            --collect-all cv2 \
            --collect-submodules uvicorn \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import uvicorn.lifespan.off \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.http.h11_impl \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.loops.asyncio \
            main.py

      - name: Place sidecar binary for Tauri
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          cp "sidecar/dist/sidecar${{ matrix.sidecar-ext }}" \
             "src-tauri/binaries/sidecar-${{ matrix.target }}${{ matrix.sidecar-ext }}"
          ls -lh src-tauri/binaries/

      # ── Node.js + Rust ──
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      # ── Tauri ビルド & リリース下書き ──
      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Nitido ${{ github.ref_name }}'
          releaseBody: |
            Windows および macOS 向けのバイナリです。

            ---

            Binaries for Windows and macOS.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri-args }}
